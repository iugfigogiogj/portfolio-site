<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TikTok Sales Analytics Dashboard</title>
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Google Fonts + Font Awesome для иконок -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0B0E14;
            font-family: 'Inter', sans-serif;
            padding: 32px 24px;
            color: #EFF3F8;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Шапка */
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 20px;
        }
        .title-section h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #25F4EE);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .title-section h1 i {
            background: none;
            color: #25F4EE;
            -webkit-background-clip: unset;
            background-clip: unset;
            font-size: 1.8rem;
        }
        .sub {
            font-size: 0.9rem;
            color: #9AA4BF;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .date-badge {
            background: #1E2538;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid rgba(37, 244, 238, 0.25);
            color: #C0D0E3;
        }
        .date-badge i {
            margin-right: 6px;
            color: #25F4EE;
        }

        /* Карточки (3 колонки: график, товары, заявки) - грид */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 0.9fr 0.9fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        /* Общий стиль карточек */
        .card {
            background: #121826;
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s, border-color 0.2s;
        }
        .card:hover {
            border-color: rgba(37, 244, 238, 0.3);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 1.2rem;
            color: #E0E9F5;
            border-left: 3px solid #25F4EE;
            padding-left: 12px;
        }
        .card-header i {
            color: #25F4EE;
            font-size: 1.3rem;
        }

        /* График */
        .chart-container {
            position: relative;
            width: 100%;
            height: 300px;
        }

        /* Список товаров */
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .product-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .product-icon {
            width: 38px;
            height: 38px;
            background: #1F2A3E;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #25F4EE;
            font-size: 1.2rem;
        }
        .product-name {
            font-weight: 500;
        }
        .product-sales {
            font-weight: 700;
            background: #1E2A3A;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.85rem;
            color: #25F4EE;
        }
        .product-sales span {
            font-weight: 400;
            font-size: 0.7rem;
            color: #9aaec9;
        }

        /* Карточка заявок (соцсети) */
        .social-stats {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: calc(100% - 60px);
            text-align: center;
        }
        .big-number {
            font-size: 5rem;
            font-weight: 800;
            background: linear-gradient(145deg, #FFFFFF, #25F4EE);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            line-height: 1;
            margin: 15px 0;
        }
        .social-label {
            font-size: 1rem;
            letter-spacing: 1px;
            background: rgba(37, 244, 238, 0.1);
            padding: 6px 18px;
            border-radius: 60px;
            display: inline-block;
            margin-top: 8px;
        }

        /* Доп секция: KPIs мини или просто подвал */
        .extra-note {
            margin-top: 24px;
            font-size: 0.75rem;
            text-align: center;
            color: #5F6F8F;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 24px;
        }

        /* Адаптив */
        @media (max-width: 1024px) {
            .dashboard-grid {
                grid-template-columns: 1fr 1fr;
                gap: 20px;
            }
            .card:first-child {
                grid-column: span 2;
            }
            body {
                padding: 20px 16px;
            }
        }

        @media (max-width: 700px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
            .card:first-child {
                grid-column: span 1;
            }
            .header {
                flex-direction: column;
                gap: 12px;
            }
            .big-number {
                font-size: 3.8rem;
            }
            .chart-container {
                height: 250px;
            }
        }
        /* Кастомный скролл */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #1A1F2C;
        }
        ::-webkit-scrollbar-thumb {
            background: #25F4EE;
            border-radius: 5px;
        }
    </style>
</head>
<body>
<div class="dashboard-container">
    <!-- Заголовок + динамическая дата -->
    <div class="header">
        <div class="title-section">
            <h1>
                <i class="fab fa-tiktok"></i> TikTok Sales Analytics
            </h1>
            <div class="sub">
                <span><i class="fas fa-chart-line"></i> Динамика продаж · Канал TikTok Shop</span>
            </div>
        </div>
        <div class="date-badge" id="todayDate">
            <i class="far fa-calendar-alt"></i> 
            <span>Загрузка...</span>
        </div>
    </div>

    <!-- Основная сетка дашборда -->
    <div class="dashboard-grid">
        <!-- График выручки (Chart.js) -->
        <div class="card">
            <div class="card-header">
                <span><i class="fas fa-chart-simple"></i> Выручка по дням (последняя неделя)</span>
                <i class="fas fa-chevron-right" style="font-size: 0.8rem; opacity: 0.7;"></i>
            </div>
            <div class="chart-container">
                <canvas id="revenueChart" width="400" height="300" style="max-width:100%; height:auto;"></canvas>
            </div>
            <div style="margin-top: 16px; font-size: 0.7rem; text-align: center; color: #7F8EA3;">
                <i class="fas fa-ruble-sign"></i> Суммы в рублях (₽)
            </div>
        </div>

        <!-- Блок "Товары" - список 5 товаров с продажами -->
        <div class="card">
            <div class="card-header">
                <span><i class="fas fa-box-open"></i> Топ-товары TikTok</span>
                <i class="fas fa-fire" style="color: #FFA559;"></i>
            </div>
            <div class="product-list" id="productList">
                <!-- Динамически заполним через JS (но статичные данные, вшиты) -->
            </div>
            <div style="margin-top: 18px; font-size: 0.7rem; text-align: right; color:#4e6285;">
                <i class="fas fa-chart-simple"></i> продаж за неделю
            </div>
        </div>

        <!-- Карточка Заявки из соцсетей: число 247 -->
        <div class="card">
            <div class="card-header">
                <span><i class="fas fa-headset"></i> Заявки из соцсетей</span>
                <i class="fab fa-telegram-plane"></i>
            </div>
            <div class="social-stats">
                <div class="big-number">247</div>
                <div class="social-label">
                    <i class="fab fa-tiktok"></i> + <i class="fab fa-instagram"></i> + <i class="fab fa-vk"></i>
                </div>
                <p style="font-size: 0.75rem; margin-top: 16px; color:#8C9BB0;">Активные заявки за последние 30 дней</p>
            </div>
        </div>
    </div>
    <div class="extra-note">
        <i class="fas fa-chart-line"></i> Данные обновлены: ежедневная синхронизация с TikTok Ads / CRM
    </div>
</div>

<script>
    // 1. Установка сегодняшней даты в красивом формате
    function setTodayDate() {
        const dateElem = document.querySelector('#todayDate span');
        if (dateElem) {
            const today = new Date();
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            const formattedDate = today.toLocaleDateString('ru-RU', options);
            dateElem.textContent = formattedDate;
        }
    }
    setTodayDate();

    // 2. Данные выручки по дням за последнюю неделю (рубли)
    const revenueData = [5000, 7000, 6000, 12000, 10000, 8000, 9000];
    // Подписи дней: последние 7 дней (относительно сегодня)
    function getLastWeekDays() {
        const days = [];
        const today = new Date();
        for (let i = 6; i >= 0; i--) {
            const d = new Date(today);
            d.setDate(today.getDate() - i);
            const dayName = d.toLocaleDateString('ru-RU', { weekday: 'short' }).slice(0, 3);
            const dayNum = d.getDate();
            days.push(`${dayName} ${dayNum}`);
        }
        return days;
    }
    const weekLabels = getLastWeekDays();

    // 3. Отрисовка графика Chart.js
    const ctx = document.getElementById('revenueChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: weekLabels,
            datasets: [{
                label: 'Выручка (₽)',
                data: revenueData,
                backgroundColor: 'rgba(37, 244, 238, 0.1)',
                borderColor: '#25F4EE',
                borderWidth: 3,
                pointBackgroundColor: '#25F4EE',
                pointBorderColor: '#0B0E14',
                pointRadius: 5,
                pointHoverRadius: 7,
                tension: 0.3,
                fill: true,
                pointBorderWidth: 2,
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
                tooltip: {
                    backgroundColor: '#1A2538',
                    titleColor: '#EFF3F8',
                    bodyColor: '#25F4EE',
                    callbacks: {
                        label: function(context) {
                            return `💰 ${context.raw.toLocaleString('ru-RU')} ₽`;
                        }
                    }
                },
                legend: {
                    labels: {
                        color: '#C7D4E6',
                        font: { size: 12, weight: '500' }
                    },
                    position: 'top',
                }
            },
            scales: {
                y: {
                    grid: { color: 'rgba(255,255,255,0.05)' },
                    title: {
                        display: true,
                        text: 'рублей',
                        color: '#A0B2CE',
                    },
                    ticks: {
                        color: '#BDCFEE',
                        callback: function(val) {
                            return val.toLocaleString('ru-RU') + '₽';
                        }
                    }
                },
                x: {
                    grid: { display: false },
                    ticks: { color: '#BDCFEE', font: { size: 11 } }
                }
            },
            interaction: { mode: 'index', intersect: false },
        }
    });

    // 4. Товары: список из 5 вымышленных с количеством продаж (статически)
    const products = [
        { name: "Вибрационный массажер", sales: 189, icon: "fas fa-hand-sparkles" },
        { name: "Светящийся хула-хуп", sales: 134, icon: "fas fa-circle-notch" },
        { name: "Мини-проектор для фото", sales: 97, icon: "fas fa-projector" },
        { name: "Умная щетка для волос", sales: 212, icon: "fas fa-brush" },
        { name: "Ледяной роллер для лица", sales: 156, icon: "fas fa-icicles" }
    ];

    function renderProductList() {
        const container = document.getElementById('productList');
        if (!container) return;
        container.innerHTML = '';
        products.forEach(prod => {
            const productDiv = document.createElement('div');
            productDiv.className = 'product-item';
            productDiv.innerHTML = `
                <div class="product-info">
                    <div class="product-icon"><i class="${prod.icon}"></i></div>
                    <div class="product-name">${prod.name}</div>
                </div>
                <div class="product-sales">${prod.sales} <span>шт</span></div>
            `;
            container.appendChild(productDiv);
        });
    }
    renderProductList();

    // Дополнительно: можно добавить анимацию при загрузке, но всё и так плавное
    // Для адаптивности графика при изменении размеров (chart.js сам адаптируется)
    window.addEventListener('resize', () => {
        // Chart.js автоматически перерисовывается благодаря responsive: true
    });
</script>

<!-- Небольшой фикс для отображения иконок в темной теме -->
</body>
</html>
